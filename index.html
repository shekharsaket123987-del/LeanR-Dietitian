<!DOCTYPE html>
<html>
<head>
<title>LeanR Counselling Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f5f6fa;
}

.card{
box-shadow:0 2px 8px rgba(0,0,0,0.1);
border-radius:10px;
}

.metric{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="mb-4">LeanR Coach Counselling Dashboard</h3>

<div class="row">

<div class="col-md-3">
<div class="card p-3">
Total Coaches
<div class="metric" id="coaches"></div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
Active Clients
<div class="metric" id="clients"></div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
Weekly Counselling
<div class="metric" id="weekly"></div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
Available Bandwidth
<div class="metric" id="bandwidth"></div>
</div>
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<div class="card p-3">
<h5>Active Clients Per Coach</h5>
<canvas id="clientChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<h5>Counselling Completed</h5>
<canvas id="counsellingChart"></canvas>
</div>
</div>

</div>

<br>

<div class="card p-3">

<h5>Coach Details</h5>

<table class="table table-bordered">

<thead>

<tr>
<th>Coach</th>
<th>Shift</th>
<th>Active Clients</th>
<th>Bandwidth</th>
<th>Weekly Scheduled</th>
<th>Completed</th>
<th>Avg Time</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

<script>

const data = [

{name:"Niranjanjeet",shift:"12-9",clients:54,bandwidth:21,weekly:4,completed:2,time:0},

{name:"Sanskar",shift:"8-5",clients:53,bandwidth:22,weekly:2,completed:0,time:0},

{name:"Rohit",shift:"12-9",clients:50,bandwidth:25,weekly:2,completed:0,time:0},

{name:"Sunil",shift:"8-5",clients:50,bandwidth:25,weekly:1,completed:1,time:0},

{name:"Bonita",shift:"8-5",clients:50,bandwidth:25,weekly:1,completed:0,time:0}

];

document.getElementById("coaches").innerHTML=data.length;

let totalClients=0;
let totalBandwidth=0;
let totalWeekly=0;

data.forEach(c=>{
totalClients+=c.clients
totalBandwidth+=c.bandwidth
totalWeekly+=c.weekly
})

document.getElementById("clients").innerHTML=totalClients
document.getElementById("bandwidth").innerHTML=totalBandwidth
document.getElementById("weekly").innerHTML=totalWeekly

const labels=data.map(c=>c.name)

const clientData=data.map(c=>c.clients)

const counsellingData=data.map(c=>c.completed)

new Chart(document.getElementById("clientChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Active Clients",
data:clientData
}]
}
})

new Chart(document.getElementById("counsellingChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Counselling Completed",
data:counsellingData
}]
}
})

let table=""

data.forEach(c=>{
table+=`
<tr>
<td>${c.name}</td>
<td>${c.shift}</td>
<td>${c.clients}</td>
<td>${c.bandwidth}</td>
<td>${c.weekly}</td>
<td>${c.completed}</td>
<td>${c.time}</td>
</tr>
`
})

document.getElementById("tableData").innerHTML=table

</script>

</body>
</html>
